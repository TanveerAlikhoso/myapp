<style>.material-symbols-outlined {
    font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24
    }
.glass-panel {
    background: rgba(32, 31, 31, 0.4);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.1)
    }
.success-glow {
    box-shadow: 0 0 50px rgba(255, 122, 0, 0.2)
    }
.bg-cinematic {
    background-image: linear-gradient(to bottom, rgba(19, 19, 19, 0.85), rgba(19, 19, 19, 0.95)), url(https://lh3.googleusercontent.com/aida-public/AB6AXuCbCeL0GVoePcHtknawXm3yTblfEwMhv5z2OWizaw1vD58kX7KrjICxTC1iTMYy8yvX4bintE6tM7MdNSrT0kBHFuAARVPD8x1Kpgnu2lnBsFVSkpVDu0sZ2Qrodu1mpZBWDgmkPvzwI4XGfVfJU3QidMAgEk-3Otzm9qd1AHDKOuqU45RyynPyL6spd694zieQ7ywYBkmGdbiN8S8bT84LeTgTnzx95zsaufvIGqIsQNBks15L866GKZYv-YeKLUhWioGyWzTpzF7l);

<body class="bg-background text-on-background font-body-md selection:bg-primary-container selection:text-on-primary-container overflow-x-hidden min-h-screen flex flex-col">
<!-- Cinematic Backdrop -->
<div class="fixed inset-0 z-0 bg-cinematic grayscale-[30%] blur-sm" data-alt="A high-end, cinematic close-up of a gourmet burger and artisanal fries arranged on a rustic dark slate board. The lighting is moody and dramatic, with warm amber glows highlighting the textures of the food. Deep shadows and a sophisticated dark-mode aesthetic create a luxury dining atmosphere, emphasizing the vibrant oranges and golden browns of the perfectly cooked feast."></div>
<!-- Ambient Glow Overlays -->
<div class="fixed top-[-10%] right-[-10%] w-[500px] h-[500px] bg-primary-container/10 rounded-full blur-[120px] pointer-events-none"></div>
<div class="fixed bottom-[-10%] left-[-10%] w-[600px] h-[600px] bg-on-tertiary-fixed-variant/10 rounded-full blur-[150px] pointer-events-none"></div>
<!-- Main Content Canvas -->
<main class="relative z-10 flex-grow flex items-center justify-center px-margin-mobile md:px-margin-desktop py-12">
<!-- Transactional Success Container -->
<div class="glass-panel w-full max-w-[640px] rounded-[40px] p-8 md:p-12 text-center success-glow flex flex-col items-center">
<!-- High-Gloss Success Icon -->
<div class="mb-10 relative">
<div class="absolute inset-0 bg-primary-container/20 blur-2xl rounded-full"></div>
<div class="relative w-24 h-24 rounded-full bg-gradient-to-br from-primary-container to-secondary flex items-center justify-center shadow-[0_0_30px_rgba(255,122,0,0.4)]">
<span class="material-symbols-outlined text-[48px] text-on-primary-fixed" style="font-variation-settings: 'wght' 700;">check</span>
</div>
</div>
<!-- Typography Cluster -->
<div class="space-y-4 mb-12">
<h1 class="font-headline-lg-mobile md:font-headline-lg text-on-surface tracking-tight">
                    Your Luxury Feast is on the Way
                </h1>
<p class="font-body-lg text-on-surface-variant max-w-[400px] mx-auto">
                    Our master chefs are preparing your selection with artisanal precision.
                </p>
</div>
<!-- Order Details Bento Card -->
<div class="w-full grid grid-cols-1 md:grid-cols-2 gap-4 mb-12">
<div class="bg-surface-container-low/50 border border-white/5 rounded-2xl p-6 text-left">
<span class="font-label-sm text-outline uppercase tracking-widest block mb-1">Order ID</span>
<span class="font-headline-md text-on-surface">#LB-882910</span>
</div>
<div class="bg-surface-container-low/50 border border-white/5 rounded-2xl p-6 text-left">
<span class="font-label-sm text-outline uppercase tracking-widest block mb-1">Arrival Time</span>
<span class="font-headline-md text-primary">25 - 30 Mins</span>
</div>
</div>
<!-- Action Buttons -->
<div class="w-full flex flex-col gap-4">
<button class="w-full bg-gradient-to-r from-primary-container to-secondary text-on-primary-fixed font-label-lg py-5 px-8 rounded-2xl shadow-[0_8px_20px_rgba(255,122,0,0.3)] hover:scale-[1.02] active:scale-95 transition-all duration-300 flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="location_on">location_on</span>
                    Track Order
                </button>
<button class="w-full bg-white/5 hover:bg-white/10 text-on-surface font-label-lg py-5 px-8 rounded-2xl border border-white/10 transition-all duration-300 flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="receipt_long">receipt_long</span>
                    View Receipt
                </button>
</div>
<!-- Culinary Status Progress -->
<div class="mt-12 w-full">
<div class="flex justify-between items-center mb-3 px-2">
<span class="font-label-sm text-primary">In Preparation</span>
<span class="font-label-sm text-on-surface-variant">75%</span>
</div>
<div class="w-full h-1.5 bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full w-3/4 bg-gradient-to-r from-primary-container to-secondary shadow-[0_0_10px_rgba(255,122,0,0.5)] rounded-full"></div>
</div>
</div>
</div>
</main>
<!-- Contextual Footer (Simplified for Transactional Page) -->
<footer class="relative z-10 w-full px-margin-mobile md:px-margin-desktop py-8 text-center">
<div class="max-w-container-max mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
<span class="font-display-lg text-[20px] text-primary-container tracking-tighter">Lumina Bites</span>
<p class="font-body-md text-on-surface-variant/60 text-[14px]">
                © 2024 Lumina Bites. All Rights Reserved.
            </p>
<div class="flex gap-6">
<a class="font-label-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Help Center</a>
<a class="font-label-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Contact Support</a>
</div>
</div>
</footer>
