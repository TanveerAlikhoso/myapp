    }
  ];

  const categoryContainer = document.getElementById('category-container');
  const menuGrid = document.getElementById('menu-grid');

  function renderCategory(category) {
    // 1. Highlight button
    const buttons = categoryContainer.querySelectorAll('.category-btn');
    buttons.forEach(btn => {
      if (btn.getAttribute('data-category') === category) {
        btn.className = "category-btn flex items-center gap-2 px-6 py-3 rounded-full glossy-button text-on-primary-fixed font-label-lg whitespace-nowrap";
      } else {
        btn.className = "category-btn flex items-center gap-2 px-6 py-3 rounded-full bg-surface-container border border-outline/20 text-on-surface-variant font-label-lg whitespace-nowrap hover:bg-surface-variant transition-colors";
      }
    });

    // 2. Filter products
    const filteredProducts = category === 'all' 
      ? PRODUCTS 
      : PRODUCTS.filter(p => p.category === category);

    // 3. Clear and render grid
    menuGrid.innerHTML = '';
    
    filteredProducts.forEach(product => {
      const card = document.createElement('div');
      card.className = "glass-panel rounded-[32px] p-8 relative flex flex-col md:flex-row gap-8 items-center group transition-transform hover:scale-[1.02]";
      card.innerHTML = `
        <div class="w-48 h-48 md:w-56 md:h-56 -mt-20 md:-ml-20 md:mt-0 flex-shrink-0 relative">
          <div class="absolute inset-0 bg-primary/20 blur-3xl rounded-full group-hover:bg-primary/30 transition-all"></div>
          <img class="w-full h-full object-cover rounded-full floating-image relative z-10" src="${product.image}" alt="${product.name}"/>
        </div>
        <div class="flex-grow w-full">
          <div class="flex justify-between items-start mb-2">
            <h3 class="font-headline-md text-primary-fixed-dim">${product.name}</h3>
            <span class="font-headline-md text-primary">$${product.price.toFixed(2)}</span>
          </div>
          <p class="text-on-surface-variant font-body-md mb-6 line-clamp-2">${product.description}</p>
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-2">
              <span class="bg-surface-container-high px-3 py-1 rounded-full text-[10px] font-label-sm border border-outline/10 text-outline uppercase">${product.tag || 'PREMIUM'}</span>
            </div>
            <div class="flex items-center bg-surface-container-low rounded-full border border-outline/20 p-1">
              <button class="w-8 h-8 flex items-center justify-center hover:bg-surface-variant rounded-full text-primary transition-colors">
                <span class="material-symbols-outlined text-[18px]">remove</span>
              </button>
              <span class="px-3 font-label-lg">0</span>
              <button class="w-8 h-8 flex items-center justify-center bg-primary rounded-full text-on-primary-container shadow-lg">
                <span class="material-symbols-outlined text-[18px]">add</span>
              </button>
            </div>
          </div>
        </div>
      `;
      menuGrid.appendChild(card);
    });
  }

  // Add click listeners to category buttons
  categoryContainer.addEventListener('click', (e) => {
    const btn = e.target.closest('.category-btn');
    if (!btn) return;
    const category = btn.getAttribute('data-category');
    renderCategory(category);
  });

  // Initial render (render all)
  renderCategory('all');
</script>
</body></html>
